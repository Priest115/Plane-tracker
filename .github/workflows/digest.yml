name: Daily Digest
 
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
 
jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Restore tracker state
        uses: actions/cache@v4
        with:
          path: tracker_state.json
          key: digest-${{ github.run_id }}
          restore-keys: |
            tracker-state-
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Send digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python digest.py
